<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Shanghai exploration map</title>
  <desc id="desc">A simplified Shanghai orientation map showing the Huangpu River, Suzhou Creek, airports, railway stations, neighborhoods, major sights, and museum areas.</desc>
  <rect width="920" height="620" fill="#f7f4ee"/>
  <path d="M0 540 C160 505 250 565 394 512 C530 462 632 524 920 462 L920 620 L0 620 Z" fill="#e6eee9"/>
  <path d="M0 64 C150 22 298 50 436 28 C620 0 748 48 920 26 L920 0 L0 0 Z" fill="#edf1e8"/>
  <path d="M520 18 C468 80 462 150 508 214 C554 276 624 306 604 382 C584 470 646 522 730 596" fill="none" stroke="#9bb9c6" stroke-width="44" stroke-linecap="round"/>
  <path d="M0 220 C118 208 186 184 282 204 C374 224 438 202 520 178" fill="none" stroke="#adc7d1" stroke-width="24" stroke-linecap="round"/>
  <path d="M520 18 C468 80 462 150 508 214 C554 276 624 306 604 382 C584 470 646 522 730 596" fill="none" stroke="#d9ecf1" stroke-width="18" stroke-linecap="round"/>
  <path d="M0 220 C118 208 186 184 282 204 C374 224 438 202 520 178" fill="none" stroke="#e5f3f6" stroke-width="10" stroke-linecap="round"/>
